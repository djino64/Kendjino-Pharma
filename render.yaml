services:
  # Backend Django
  - type: web
    name: kendjino-pharma-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kendjino_pharma_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false

  # Frontend React
  - type: static
    name: kendjino-pharma-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://kendjino-pharma-api.onrender.com

  # Base de données PostgreSQL
  - type: postgresql
    name: kendjino_pharma_db
    plan: free