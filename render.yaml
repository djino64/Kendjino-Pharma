################################################################################
# render.yaml — Kendjino Pharma
# Deploy sur Render avec : Dashboard > New > Blueprint
################################################################################

services:
  # ─── Backend Django ──────────────────────────────────────────────────────────
  - type: web
    name: kendjino-pharma-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/auth/login/   # endpoint qui répond 405 (Method Not Allowed) = service up
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod

      - key: SECRET_KEY
        generateValue: true             # Render génère automatiquement une clé sécurisée

      - key: DATABASE_URL
        fromDatabase:
          name: kendjino-pharma-db
          property: connectionString    # Render injecte l'URL PostgreSQL automatiquement

      - key: ALLOWED_HOSTS
        value: kendjino-pharma-api.onrender.com

      - key: CORS_ALLOWED_ORIGINS
        value: https://kendjino-pharma.onrender.com

      - key: PYTHON_VERSION
        value: "3.12"

  # ─── Frontend React (Static Site) ───────────────────────────────────────────
  - type: web
    name: kendjino-pharma
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: REACT_APP_API_URL
        value: https://kendjino-pharma-api.onrender.com/api
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html        # SPA routing

# ─── Base de données PostgreSQL ──────────────────────────────────────────────
databases:
  - name: kendjino-pharma-db
    databaseName: kendjino_pharma
    user: kendjino_user
    plan: free                          # Changer en "starter" pour production